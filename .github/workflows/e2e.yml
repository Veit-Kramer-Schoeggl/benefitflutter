name: E2E (Android emulator)

# Runs the integration_test/ end-to-end suite on an Android emulator.
# Deliberately NOT triggered on pull_request: the emulator job is slow
# (~8-12 min) and occasionally flaky, so it must never block PRs. It runs
# after merge to main and can be started manually via "Run workflow".
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    name: integration_test (emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.1
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Hardware acceleration for the emulator (available on ubuntu-latest).
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run integration tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          script: flutter test integration_test
